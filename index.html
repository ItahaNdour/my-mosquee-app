<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMosque</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=6">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="card header">
<button id="admin-button" class="icon-btn">
<i class="fa-solid fa-user-shield"></i>
<span id="admin-badge" class="admin-badge" style="display:none">0</span>
</button>

<h1 id="mosque-name" class="title">Mosquée</h1>

<div id="mosque-select-row" style="display:none">
<select id="mosque-selector"></select>
</div>

<div class="clock">
<span id="current-time"></span>
</div>
</header>

<main class="main">

<section class="card">
<h3>💰 Faire un don</h3>

<div>
Objectif : <strong><span id="don-public-goal">0</span> CFA</strong><br>
Collecté : <strong><span id="don-public-month">0</span> CFA</strong>
</div>

<div class="progress-bar">
<span id="don-public-bar"></span>
</div>

<button id="btn-wave" class="btn">Wave</button>
<button id="btn-orange" class="btn">Orange</button>
<button id="btn-claimed" class="btn btn-ghost">J’ai donné</button>

</section>

<section id="don-admin" class="card" style="display:none">
<h3>Suivi des dons</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Montant</th>
<th>Cat.</th>
<th>Réf.</th>
<th>Statut</th>
<th>Action</th>
</tr>
</thead>
<tbody id="don-table-body"></tbody>
</table>
</section>

</main>

<!-- MODAL MINI FORM -->
<div id="don-modal" class="modal">
<div class="modal-box">
<h3>Confirmation du don</h3>

<input id="don-amount" type="number" placeholder="Montant CFA">

<select id="don-category">
<option>Zakat</option>
<option selected>Sadaqa</option>
<option>Travaux</option>
</select>

<input id="don-ref" placeholder="Référence">

<button id="don-confirm" class="btn">Confirmer</button>
<button onclick="closeDonModal()" class="btn btn-ghost">Annuler</button>
</div>
</div>

<div id="popup" class="popup"></div>

<script src="app.js?v=6"></script>
</body>
</html>
