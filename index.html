<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mosquée</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f7d6d">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .clock {
      font-size: 32px;
      text-align: center;
      margin: 10px 0;
    }

    .prayer {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

    .tools button {
      margin: 5px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .active {
      background: #2f7d6d;
      color: white;
    }

    .hidden {
      display: none;
    }

    .big {
      font-size: 26px;
      text-align: center;
      margin: 10px 0;
    }

    .arabic {
      font-size: 18px;
      text-align: right;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Mosquée</h2>
    <div id="clock" class="clock">--:--:--</div>

    <div class="prayer"><span>Fajr</span><span id="fajr">--:--</span></div>
    <div class="prayer"><span>Dhuhr</span><span id="dhuhr">--:--</span></div>
    <div class="prayer"><span>Asr</span><span id="asr">--:--</span></div>
    <div class="prayer"><span>Maghrib</span><span id="maghrib">--:--</span></div>
    <div class="prayer"><span>Isha</span><span id="isha">--:--</span></div>
  </div>

  <div class="card tools">
    <h3>Outils</h3>

    <button id="btn-tasbih">Tasbih</button>
    <button id="btn-hadith">Hadith</button>
    <button id="btn-dua">Du'a</button>
    <button id="btn-dhikr">Dhikr</button>

    <!-- TASBIH -->
    <div id="tasbih" class="tool">
      <div id="tasbih-count" class="big">0</div>
      <button id="btn-plus">+1</button>
      <button id="btn-reset">Reset</button>
    </div>

    <!-- HADITH -->
    <div id="hadith" class="tool hidden">
      <div id="hadith-fr"></div>
      <div id="hadith-ph" class="small"></div>
      <div id="hadith-ar" class="arabic"></div>
      <button id="btn-hadith-change">Changer</button>
    </div>

    <!-- DUA -->
    <div id="dua" class="tool hidden">
      <div id="dua-fr"></div>
      <div id="dua-ph" class="small"></div>
      <div id="dua-ar" class="arabic"></div>
      <button id="btn-dua-change">Changer</button>
    </div>

    <!-- DHIKR -->
    <div id="dhikr" class="tool hidden">
      <div id="dhikr-fr"></div>
      <div id="dhikr-ph" class="small"></div>
      <div id="dhikr-ar" class="arabic"></div>
      <button id="btn-dhikr-change">Changer</button>
    </div>

  </div>

  <script src="app.js?v=8000"></script>
</body>
</html>
